<style>
    body { background-color: #0A0A0B; color: #e5e2e3; overflow: hidden; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    .glass-card { backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); }
    .radar-pulse { animation: pulse 2s infinite; }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(3); opacity: 0; }
    }
    .radar-overlay {
      background: radial-gradient(circle at center, rgba(208, 243, 255, 0.15) 0%, transparent 70%);
      mix-blend-mode: screen;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md selection:bg-primary-container/30">
<!-- Full Screen Radar Map -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-[#0A0A0B]">
<img class="w-full h-full object-cover opacity-60 grayscale brightness-50" data-alt="A sophisticated dark-themed meteorological satellite map showing an urban coastal region at night. The map displays intricate atmospheric data with ethereal translucent overlays of teal and light blue representing rain patterns. High-contrast white outlines define geographic borders against a deep charcoal void, creating a premium high-tech aesthetic typical of advanced weather instruments. The lighting is moody and atmospheric, emphasizing precision and scientific clarity." data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuApU5eQmTg1Om28yuH-M_HXb2TGJgmio6Jl-6kRX9eKe14A9EnvYXvEhS1TL6ZtiPk06iWamyWt2yQjPL9DzlA0ImVGFnNQ5NTl_FE-ybWHy5iTJ5Rs-iEoYB3Q1UjPSiMqYMRX42KoAhwNfos5pk_ituQjTZ3tzFViFb4J8LdGXpxKzhiIV3usNNvQlKmzcDbv0a5b1IpuVklfk9FouB6xE7JEnQkS4BWkwLxeCYM9GOqXq9_U05mEkk9I_KYkq7oeZGMl_axpRRw"/>
<!-- Simulated Radar Layers -->
<div class="radar-overlay absolute inset-0 pointer-events-none"></div>
<!-- Dynamic Radar Blip for Current Location -->
<div class="absolute top-[45%] left-[55%] pointer-events-none">
<div class="w-4 h-4 bg-primary rounded-full relative">
<div class="absolute inset-0 bg-primary rounded-full radar-pulse"></div>
</div>
</div>
</div>
</div>
<!-- Top Navigation Shell (Mapped from JSON) -->
<header class="flex justify-between items-center w-full px-container-padding-mobile h-16 fixed top-0 z-50 bg-surface/30 backdrop-blur-xl border-b border-white/15">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="search">search</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">SkyGlass</h1>
</div>
<!-- Desktop-only Top Nav Cluster -->
<nav class="hidden md:flex items-center gap-8">
<button class="text-primary font-bold font-label-caps text-label-caps hover:bg-white/10 transition-colors px-3 py-2 rounded-lg">RADAR</button>
<button class="text-on-surface-variant font-label-caps text-label-caps hover:bg-white/10 transition-colors px-3 py-2 rounded-lg">FORECAST</button>
<button class="text-on-surface-variant font-label-caps text-label-caps hover:bg-white/10 transition-colors px-3 py-2 rounded-lg">AIR QUALITY</button>
</nav>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant p-2 hover:bg-white/10 rounded-full transition-colors cursor-pointer" data-icon="settings">settings</span>
</div>
</header>
<!-- Map Layer Toggles -->
<div class="fixed top-20 left-1/2 -translate-x-1/2 z-40 px-4 w-full max-w-md">
<div class="glass-card bg-surface/40 rounded-full p-1.5 flex gap-1 items-center overflow-hidden">
<button class="flex-1 py-2 px-4 rounded-full font-label-caps text-label-caps bg-primary-container text-on-primary-container transition-all duration-300" id="layer-Rain" onclick="updateLayer('Rain')">
        RAIN
      </button>
<button class="flex-1 py-2 px-4 rounded-full font-label-caps text-label-caps text-on-surface-variant hover:bg-white/10 transition-all duration-300" id="layer-Wind" onclick="updateLayer('Wind')">
        WIND
      </button>
<button class="flex-1 py-2 px-4 rounded-full font-label-caps text-label-caps text-on-surface-variant hover:bg-white/10 transition-all duration-300" id="layer-Temp" onclick="updateLayer('Temp')">
        TEMP
      </button>
<button class="flex-1 py-2 px-4 rounded-full font-label-caps text-label-caps text-on-surface-variant hover:bg-white/10 transition-all duration-300" id="layer-UV" onclick="updateLayer('UV')">
        UV
      </button>
</div>
</div>
<!-- Location & Temperature Float -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 z-40 w-[90%] max-w-md">
<div class="glass-card bg-surface/50 rounded-2xl p-6 flex items-center justify-between shadow-2xl active:scale-95 transition-transform duration-200">
<div class="flex items-center gap-4">
<div class="bg-primary-container/20 p-3 rounded-xl">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-primary mb-0.5">CURRENT LOCATION</p>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">San Francisco, CA</h2>
</div>
</div>
<div class="text-right">
<span class="font-display-temp text-[48px] leading-tight text-on-surface">62°</span>
</div>
</div>
</div>
<!-- Bottom Navigation Shell (Mapped from JSON) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface/40 backdrop-blur-2xl border-t border-white/15 rounded-t-xl">
<!-- Map Tab (Active) -->
<div class="flex flex-col items-center">
<div class="bg-primary-container text-on-primary-container rounded-full p-2 scale-90 duration-150 cursor-pointer" onclick="window.location.href='code.html'">
<span class="material-symbols-outlined" data-icon="map">map</span>
</div>
</div>
<div class="flex flex-col items-center group cursor-pointer" onclick="window.location.href='../weather_dashboard/code.html'">
<div class="text-on-surface-variant p-2 group-hover:text-primary transition-all">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
</div>
</div>
<div class="flex flex-col items-center group cursor-pointer" onclick="window.location.href='../detailed_forecast/code.html'">
<div class="text-on-surface-variant p-2 group-hover:text-primary transition-all">
<span class="material-symbols-outlined" data-icon="filter_drama">filter_drama</span>
</div>
</div>
<div class="flex flex-col items-center group cursor-pointer" onclick="window.location.href='../settings/code.html'">
<div class="text-on-surface-variant p-2 group-hover:text-primary transition-all">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</div>
</div>
</footer>
<script>
    function updateLayer(layerName) {
      // Logic for toggle visual update
      const layers = ['Rain', 'Wind', 'Temp', 'UV'];
      layers.forEach(l => {
        const el = document.getElementById(`layer-${l}`);
        if (l === layerName) {
          el.classList.add('bg-primary-container', 'text-on-primary-container');
          el.classList.remove('text-on-surface-variant', 'hover:bg-white/10');
        } else {
          el.classList.remove('bg-primary-container', 'text-on-primary-container');
          el.classList.add('text-on-surface-variant', 'hover:bg-white/10');
        }
      });
      
      // Feedback pulse simulation
      const radarOverlay = document.querySelector('.radar-overlay');
      radarOverlay.style.opacity = '0';
      setTimeout(() => {
        radarOverlay.style.transition = 'opacity 1s ease-in-out';
        radarOverlay.style.opacity = '1';
      }, 50);
    }

    // Micro-interaction for the location card
    document.querySelector('.glass-card').addEventListener('touchstart', function() {
      this.classList.add('scale-95');
    });
    document.querySelector('.glass-card').addEventListener('touchend', function() {
      this.classList.remove('scale-95');
    });
  </script>
  <script src="../weather.js"></script>
</body></html>
